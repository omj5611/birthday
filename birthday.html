<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎂 생일 축하해!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Camera background */
  #camera-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 0;
  }

  /* Semi-transparent dark overlay */
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.25);
    z-index: 1;
  }

  /* Main container */
  #app {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 5vh;
  }

  /* Camera permission screen */
  #cam-permission {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: linear-gradient(135deg, #1a0a2e, #2d1b4e, #1a0a2e);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 30px;
  }

  #cam-permission .emoji { font-size: 64px; animation: bounce 1.5s infinite; }
  #cam-permission h2 {
    font-family: 'Pacifico', cursive;
    color: #FFD700;
    font-size: clamp(22px, 6vw, 32px);
    text-align: center;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
  }
  #cam-permission p {
    color: rgba(255,255,255,0.8);
    font-size: clamp(14px, 4vw, 16px);
    text-align: center;
    line-height: 1.6;
  }

  #allow-cam-btn {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    border: none;
    border-radius: 50px;
    padding: 16px 40px;
    font-size: clamp(16px, 4.5vw, 20px);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    color: #1a0a2e;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,215,0,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #allow-cam-btn:active { transform: scale(0.95); }

  /* Cake SVG wrapper */
  #cake-wrapper {
    position: relative;
    width: min(320px, 85vw);
    margin-bottom: 20px;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
  }

  #cake-svg { width: 100%; height: auto; }

  /* Flame animation */
  .flame {
    animation: flicker 0.4s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  .flame:nth-child(odd) { animation-delay: 0.1s; }
  .flame:nth-child(even) { animation-duration: 0.35s; }

  @keyframes flicker {
    0% { transform: scaleX(1) scaleY(1) rotate(-2deg); opacity: 1; }
    100% { transform: scaleX(0.85) scaleY(1.1) rotate(2deg); opacity: 0.9; }
  }

  .flame-outer { fill: #FF6B00; }
  .flame-inner { fill: #FFE066; }
  .flame-core  { fill: #FFFFFF; }

  /* Smoke animation */
  .smoke {
    opacity: 0;
    animation: none;
  }
  .smoke.active {
    animation: smokeRise 1.5s ease-out forwards;
  }
  @keyframes smokeRise {
    0%   { opacity: 0.8; transform: translateY(0) scale(0.5); }
    100% { opacity: 0; transform: translateY(-30px) scale(2); }
  }

  /* Button */
  #celebrate-btn {
    background: linear-gradient(135deg, #FF4E8A, #FF8C00, #FFD700);
    background-size: 200% 200%;
    animation: gradShift 3s ease infinite;
    border: none;
    border-radius: 60px;
    padding: clamp(14px, 4vw, 18px) clamp(30px, 10vw, 50px);
    font-size: clamp(18px, 5.5vw, 24px);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 30px rgba(255, 78, 138, 0.6), 0 0 0 4px rgba(255,255,255,0.25);
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  #celebrate-btn:active { transform: scale(0.94); }
  @keyframes gradShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Countdown display */
  #countdown {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #countdown.visible { opacity: 1; }

  #countdown-num {
    font-family: 'Pacifico', cursive;
    font-size: clamp(100px, 35vw, 180px);
    color: white;
    text-shadow:
      0 0 40px rgba(255,215,0,0.9),
      0 0 80px rgba(255,165,0,0.6),
      0 6px 0 rgba(0,0,0,0.4);
    animation: none;
    transform: scale(1);
  }
  #countdown-num.pop {
    animation: popNum 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }
  @keyframes popNum {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes popOut {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  /* Birthday message */
  #birthday-msg {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #birthday-msg.visible {
    opacity: 1;
    transform: scale(1);
  }

  #msg-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(36px, 12vw, 72px);
    color: #FFD700;
    text-shadow:
      0 0 20px rgba(255,215,0,0.9),
      0 0 60px rgba(255,165,0,0.6),
      0 4px 0 rgba(180, 90, 0, 0.6);
    text-align: center;
    line-height: 1.2;
    padding: 0 20px;
  }
  #msg-sub {
    font-size: clamp(16px, 4.5vw, 22px);
    color: rgba(255,255,255,0.9);
    margin-top: 12px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    letter-spacing: 2px;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    z-index: 55;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Glow ring around candles when blown */
  .blow-glow {
    fill: rgba(255, 230, 100, 0.0);
    filter: blur(8px);
    transition: fill 0.4s;
  }
  .blow-glow.active { fill: rgba(255, 230, 100, 0.6); }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* Sparkle stars */
  .star {
    position: fixed;
    pointer-events: none;
    z-index: 56;
    animation: starFloat 2s ease-out forwards;
    font-size: clamp(18px, 5vw, 28px);
  }
  @keyframes starFloat {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    70% { transform: scale(1.3) rotate(180deg); opacity: 1; }
    100% { transform: scale(0.8) rotate(360deg) translateY(-60px); opacity: 0; }
  }
</style>

<script>
// ────────── CAMERA ──────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = document.getElementById('camera-video');
    video.srcObject = stream;
    document.getElementById('cam-permission').style.display = 'none';
  } catch(e) {
    alert('카메라 권한이 필요해요 😢\n설정에서 카메라를 허용해주세요!');
  }
}

// ────────── AUDIO ──────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(freq, start, duration, vol = 0.4) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
  gain.gain.setValueAtTime(0, ctx.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.02);
  gain.gain.setValueAtTime(vol, ctx.currentTime + start + duration - 0.05);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + duration);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + duration);
}

function playBirthdaySong() {
  // Happy Birthday melody
  // G4=392, A4=440, B4=494, C5=523, D5=587, E5=659, F5=698, G5=784
  const N = { G4:392, A4:440, B4:494, C5:523, D5:587, E5:659, F5:698, G5:784 };
  const tempo = 0.35;
  const notes = [
    // Line 1: Happy Birthday to you
    [N.G4,0],   [N.G4,1],   [N.A4,2],   [N.G4,3.5], [N.C5,4.5], [N.B4,6],
    // Line 2: Happy Birthday to you
    [N.G4,8],   [N.G4,9],   [N.A4,10],  [N.G4,11.5],[N.D5,12.5],[N.C5,14],
    // Line 3: Happy Birthday dear friend
    [N.G4,16],  [N.G4,17],  [N.G5,18],  [N.E5,19.5],[N.C5,21],  [N.B4,22],[N.A4,23],
    // Line 4: Happy Birthday to you
    [N.F5,24.5],[N.F5,25.5],[N.E5,26.5],[N.C5,28],  [N.D5,29],  [N.C5,31]
  ];
  const durations = [0.8,0.8,1.5,1.2,1.2,2.5, 0.8,0.8,1.5,1.2,1.2,2.5,
                     0.8,0.8,1.5,1.2,1.2,0.8,2.0, 0.8,0.8,1.5,1.2,1.5,3.0];
  notes.forEach(([freq, beat], i) => {
    playNote(freq, beat * tempo, (durations[i] || 1) * tempo * 0.85);
  });
}

// ────────── CELEBRATION ──────────
let celebrated = false;

function startCelebration() {
  if (celebrated) return;
  celebrated = true;

  const btn = document.getElementById('celebrate-btn');
  btn.disabled = true;
  btn.style.opacity = '0.5';

  // Start music immediately
  playBirthdaySong();

  // Countdown
  const countdownEl = document.getElementById('countdown');
  const numEl = document.getElementById('countdown-num');

  let count = 3;
  showCount(count);

  function showCount(n) {
    countdownEl.classList.add('visible');
    numEl.classList.remove('pop');
    numEl.textContent = n;
    void numEl.offsetWidth; // reflow
    numEl.classList.add('pop');

    if (n > 1) {
      setTimeout(() => showCount(n - 1), 900);
    } else {
      // After "1"
      setTimeout(() => {
        countdownEl.classList.remove('visible');
        blowCandles();
      }, 900);
    }
  }
}

function blowCandles() {
  const flameIds = ['flame-t1','flame-t2','flame-s1','flame-s2','flame-s3','flame-s4','flame-s5'];
  const smokeIds = ['smoke-t1','smoke-t2','smoke-s1','smoke-s2','smoke-s3','smoke-s4','smoke-s5'];

  // Quick stagger blow-out
  flameIds.forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) {
        el.style.transition = 'opacity 0.2s';
        el.style.opacity = '0';
      }
      // Show smoke
      const smoke = document.getElementById(smokeIds[i]);
      if (smoke) {
        smoke.classList.add('active');
        smoke.style.animation = 'smokeRise 1.2s ease-out forwards';
      }
    }, i * 80);
  });

  // Play blow puff sound
  playBlowSound();

  // Show birthday message after all candles out
  setTimeout(() => {
    showBirthdayMsg();
    createConfetti();
    createStars();
  }, 800);
}

function playBlowSound() {
  const ctx = getAudioCtx();
  const bufLen = ctx.sampleRate * 0.3;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen) * 0.3;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 1000;
  src.connect(filter);
  filter.connect(ctx.destination);
  src.start();
}

function showBirthdayMsg() {
  const msg = document.getElementById('birthday-msg');
  msg.classList.add('visible');
}

// ────────── CONFETTI ──────────
function createConfetti() {
  const colors = ['#FF4E8A','#FFD700','#00CED1','#FF8C00','#7B68EE','#32CD32','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (8 + Math.random() * 8) + 'px';
      el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 30);
  }
}

// ────────── STARS ──────────
function createStars() {
  const emojis = ['⭐','✨','🌟','💫','🎉','🎊','💖','🌈'];
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (10 + Math.random() * 80) + 'vw';
      el.style.top = (10 + Math.random() * 70) + 'vh';
      el.style.animationDuration = (1.5 + Math.random()) + 's';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 120);
  }
}

// Tap birthday message for more confetti
document.getElementById('birthday-msg').addEventListener('click', function() {
  createConfetti();
  createStars();
});
</script>
